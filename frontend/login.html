<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Controle de Acesso</title>

    <link rel="stylesheet" href="style.css">

    <!-- Descrição para SEO (opcional, mas profissional) -->
    <meta name="description" content="Sistema de controle de acesso escolar">

    <!-- Fonte padrão (Google Fonts pode vir depois) -->
</head>

<body>

    <!-- Container principal da página -->
    <main class="container">

        <!-- Card central de login -->
        <section class="login-card">

            <!-- Cabeçalho -->
            <header class="login-header">
                <h1>Controle de Acesso</h1>
                <p>Acesse o sistema com suas credenciais</p>
            </header>

            <!-- Formulário de login -->
            <form id="loginForm" novalidate>

                <!-- Campo de email -->
                <div class="input-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Digite seu email"
                        required
                        autocomplete="email"
                    >
                </div>

                <!-- Campo de senha -->
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Digite sua senha"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <!-- Mensagem de erro (dinâmica via JS depois) -->
                <div class="error-message" id="errorMessage" hidden>
                    Email ou senha inválidos
                </div>

                <!-- Botão de login -->
                <button type="submit" class="login-button">
                    Entrar
                </button>

            </form>

            <!-- Rodapé -->
            <footer class="login-footer">
                <small>
                    Acesso restrito a administradores e professores
                </small>
            </footer>

        </section>

    </main>

</body>
</html>
